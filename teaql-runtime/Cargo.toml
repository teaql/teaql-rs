[package]
name = "teaql-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = []
sqlx = ["dep:sqlx", "dep:tokio", "dep:teaql-dialect-sqlite", "dep:teaql-dialect-pg"]

[dependencies]
chrono = { workspace = true }
serde_json = { workspace = true }
teaql-core = { path = "../teaql-core" }
teaql-sql = { path = "../teaql-sql" }
teaql-dialect-pg = { path = "../teaql-dialect-pg", optional = true }
teaql-dialect-sqlite = { path = "../teaql-dialect-sqlite", optional = true }
sqlx = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

[dev-dependencies]
teaql-dialect-pg = { path = "../teaql-dialect-pg" }
teaql-dialect-sqlite = { path = "../teaql-dialect-sqlite" }
teaql-macros = { path = "../teaql-macros" }
tokio = { workspace = true }
